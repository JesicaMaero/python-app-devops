version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: mysql_python
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: testdb
    ports:
      - "4401:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    container_name: python_web
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - mysql

volumes:
  mysql_data:
